# No additional pull secret needed for OpenShift internal registry.
# The default ServiceAccount in proquip-dev already has imagePullSecrets
# (default-dockercfg-*) that grant pull access to images in the same project.
#
# If using an external registry (e.g., ECR), create a secret with:
#   oc create secret docker-registry ecr-pull-secret \
#     --namespace proquip-dev \
#     --docker-server=<registry-url> \
#     --docker-username=AWS \
#     --docker-password="$(aws ecr get-login-password)"
#   oc secrets link default ecr-pull-secret --for=pull -n proquip-dev
