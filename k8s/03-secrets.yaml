# Secrets are created via oc CLI, NOT from this file.
# This file documents the expected secret keys.
#
# Create the secret with:
#   oc create secret generic proquip-secrets -n proquip-dev \
#     --from-literal=DB_USER=<db-user> \
#     --from-literal=DB_PASSWORD=<db-password> \
#     --from-literal=KC_DB_USERNAME=<db-user> \
#     --from-literal=KC_DB_PASSWORD=<db-password> \
#     --from-literal=KEYCLOAK_ADMIN=<admin-user> \
#     --from-literal=KEYCLOAK_ADMIN_PASSWORD=<admin-password>
#
# Required keys:
#   DB_USER              - RDS PostgreSQL username
#   DB_PASSWORD          - RDS PostgreSQL password
#   KC_DB_USERNAME       - Keycloak DB username
#   KC_DB_PASSWORD       - Keycloak DB password
#   KEYCLOAK_ADMIN       - Keycloak admin console username
#   KEYCLOAK_ADMIN_PASSWORD - Keycloak admin console password
