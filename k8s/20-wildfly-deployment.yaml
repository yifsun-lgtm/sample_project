apiVersion: apps/v1
kind: Deployment
metadata:
  name: proquip-wildfly
  namespace: proquip-dev
  labels:
    app: proquip-wildfly
    app.kubernetes.io/part-of: proquip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proquip-wildfly
  template:
    metadata:
      labels:
        app: proquip-wildfly
    spec:
      containers:
        - name: wildfly
          image: image-registry.openshift-image-registry.svc:5000/proquip-dev/proquip-wildfly:83027e3
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9990
              name: management
          envFrom:
            - configMapRef:
                name: proquip-config
            - secretRef:
                name: proquip-secrets
          readinessProbe:
            httpGet:
              path: /proquip/api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /proquip/api/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: proquip-wildfly
  namespace: proquip-dev
  labels:
    app: proquip-wildfly
    app.kubernetes.io/part-of: proquip
spec:
  selector:
    app: proquip-wildfly
  ports:
    - name: http
      port: 8080
      targetPort: 8080
