7. 手動でブラウザテスト                       (30分)
8. フロントエンドのビルド・配置               (20分)
9. nginx 設定確認                            (10分)

<div class="columns">
<div>
<h3 id="%F0%9F%94%B4-%E4%BA%BA%E7%9A%84%E3%83%9F%E3%82%B9"><img class="emoji" draggable="false" alt="🔴" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f534.svg" data-marp-twemoji=""/> 人的ミス</h3>
<ul>
<li>デプロイの <strong>15〜25%</strong> が失敗</li>
<li>「設定ファイルを間違えた」</li>
<li>「SQL の実行順を間違えた」</li>
</ul>
<h3 id="%F0%9F%94%B4-%E5%B1%9E%E4%BA%BA%E5%8C%96"><img class="emoji" draggable="false" alt="🔴" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f534.svg" data-marp-twemoji=""/> 属人化</h3>
<ul>
<li>「田中さんがいないとデプロイできない」</li>
<li>手順書が古い / 存在しない</li>
<li>パスワードを知っているのは2人だけ</li>
</ul>
</div>
<div>
<h3 id="%F0%9F%94%B4-%E3%82%B5%E3%83%BC%E3%83%93%E3%82%B9%E5%81%9C%E6%AD%A2"><img class="emoji" draggable="false" alt="🔴" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f534.svg" data-marp-twemoji=""/> サービス停止</h3>
<ul>
<li>デプロイ中は <strong>必ず</strong> サービス停止</li>
<li>深夜・休日に実施が必要</li>
<li>ロールバックに <strong>1〜2時間</strong></li>
</ul>
<h3 id="%F0%9F%94%B4-%E3%83%AA%E3%83%AA%E3%83%BC%E3%82%B9%E9%81%85%E5%BB%B6"><img class="emoji" draggable="false" alt="🔴" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f534.svg" data-marp-twemoji=""/> リリース遅延</h3>
<ul>
<li>デプロイが怖い → <strong>月1回</strong> しかリリースできない</li>
<li>バグ修正も次のリリースまで待つ</li>
<li>ビジネスの俊敏性を阻害</li>
</ul>
</div>

<h1 id="before--after-%E6%AF%94%E8%BC%83">Before / After 比較</h1>
<table>
<thead>
<tr>
<th>作業</th>
<th>従来 (手動)</th>
<th>CI/CD (自動)</th>
</tr>
</thead>
<tbody>
<tr>
<td>コードビルド</td>
<td>ローカルで <code>mvn package</code></td>
<td>GitHub Actions が自動実行</td>
</tr>
<tr>
<td>テスト実行</td>
<td>手動 or <strong>省略</strong></td>
<td>PR ごとに <strong>自動実行</strong></td>
</tr>
<tr>

<h1 id="%E3%83%87%E3%83%A2-branch-protection">デモ: Branch Protection</h1>
<h3 id="%E3%83%9E%E3%83%BC%E3%82%B8%E5%89%8D%E3%81%AB%E8%87%AA%E5%8B%95%E3%81%A7%E5%93%81%E8%B3%AA%E3%83%81%E3%82%A7%E3%83%83%E3%82%AF">マージ前に自動で品質チェック</h3>
