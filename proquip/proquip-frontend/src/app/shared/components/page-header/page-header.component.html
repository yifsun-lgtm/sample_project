<div class="page-header">
  <div class="page-header-left">
    <!-- パンくずリスト -->
    <nav class="breadcrumbs" *ngIf="breadcrumbs.length > 0" aria-label="パンくずリスト">
      <span *ngFor="let crumb of breadcrumbs; let last = last">
        <a *ngIf="crumb.route && !last" [routerLink]="crumb.route" class="breadcrumb-link">
          {{ crumb.label }}
        </a>
        <span *ngIf="!crumb.route || last" class="breadcrumb-current">
          {{ crumb.label }}
        </span>
        <span *ngIf="!last" class="breadcrumb-separator"> / </span>
      </span>
    </nav>

    <h1 class="page-title">{{ title }}</h1>
    <p class="page-subtitle" *ngIf="subtitle">{{ subtitle }}</p>
  </div>

  <div class="page-header-actions">
    <!-- アクションボタンエリア（ng-content で外部から注入） -->
    <ng-content></ng-content>
  </div>
</div>
