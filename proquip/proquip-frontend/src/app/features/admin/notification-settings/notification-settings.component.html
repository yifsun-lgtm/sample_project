<div class="notification-settings">
  <div class="page-header">
    <h1>通知設定</h1>
  </div>

  <div class="alert alert-success" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="alert alert-error" *ngIf="errorMessage">{{ errorMessage }}</div>

  <div class="loading" *ngIf="isLoading">読み込み中...</div>

  <div class="table-container" *ngIf="!isLoading">
    <table class="data-table" *ngIf="templates.length > 0">
      <thead>
        <tr>
          <th>テンプレート名</th>
          <th>イベント種別</th>
          <th>チャネル</th>
          <th>件名</th>
          <th>有効/無効</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of templates" [class.disabled-row]="!item.active">
          <td>
            <div class="template-name">{{ item.name }}</div>
            <div class="template-code">{{ item.templateCode }}</div>
          </td>
          <td><span class="event-badge">{{ getEventTypeLabel(item.eventType) }}</span></td>
          <td>{{ getChannelLabel(item.channel) }}</td>
          <td class="subject-cell">{{ item.subject || '-' }}</td>
          <td>
            <label class="toggle-switch">
              <input type="checkbox" [checked]="item.active" (change)="toggleActive(item)">
              <span class="toggle-slider"></span>
            </label>
          </td>
          <td class="actions">
            <button class="btn btn-sm btn-outline" (click)="openEditModal(item)">編集</button>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="empty-state" *ngIf="templates.length === 0">
      <p>通知テンプレートが登録されていません。</p>
    </div>
  </div>

  <!-- 編集モーダル -->
  <div class="modal-overlay" *ngIf="showEditModal" (click)="closeEditModal()">
    <div class="modal-content modal-wide" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2>通知テンプレート編集</h2>
        <button class="btn-close" (click)="closeEditModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group">
            <label>テンプレートコード</label>
            <input type="text" [value]="editItem.templateCode" disabled>
          </div>
          <div class="form-group">
            <label>イベント種別</label>
            <input type="text" [value]="getEventTypeLabel(editItem.eventType)" disabled>
          </div>
        </div>
        <div class="form-group">
          <label>テンプレート名 <span class="required">*</span></label>
          <input type="text" [(ngModel)]="editItem.name">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>チャネル</label>
            <select [(ngModel)]="editItem.channel">
              <option *ngFor="let opt of channelOptions" [value]="opt.value">{{ opt.label }}</option>
            </select>
          </div>
          <div class="form-group">
            <label class="checkbox-label">
              <input type="checkbox" [(ngModel)]="editItem.active">
              有効
            </label>
          </div>
        </div>
        <div class="form-group">
          <label>件名テンプレート</label>
          <input type="text" [(ngModel)]="editItem.subject">
        </div>
        <div class="form-group">
          <label>本文テンプレート <span class="required">*</span></label>
          <textarea [(ngModel)]="editItem.bodyText" rows="8"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeEditModal()">キャンセル</button>
        <button class="btn btn-primary" (click)="save()" [disabled]="isSaving">
          {{ isSaving ? '保存中...' : '更新' }}
        </button>
      </div>
    </div>
  </div>
</div>
