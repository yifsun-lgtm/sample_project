<app-page-header
  title="製品編集"
  [description]="product ? product.name + ' の情報を編集' : '製品情報の編集'">
</app-page-header>

<app-loading-spinner *ngIf="isLoading"></app-loading-spinner>

<div class="edit-container" *ngIf="!isLoading && product">

  <!-- 成功メッセージ -->
  <div class="success-banner" *ngIf="successMessage">
    {{ successMessage }}
  </div>

  <!-- エラーメッセージ -->
  <div class="error-banner" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <form [formGroup]="editForm" class="edit-form" (ngSubmit)="submit()">

    <!-- 基本情報セクション -->
    <div class="form-section">
      <h3 class="section-title">基本情報</h3>

      <div class="form-row">
        <app-form-field label="製品名" [required]="true"
                        [errorMessage]="editForm.get('name')?.touched && editForm.get('name')?.errors ? '製品名は必須です' : ''">
          <input type="text" formControlName="name" class="form-input">
        </app-form-field>
      </div>

      <div class="form-row two-columns">
        <app-form-field label="SKU（品番）" [required]="true"
                        [errorMessage]="getSkuErrorMessage()">
          <div class="input-with-check">
            <input type="text" formControlName="sku" class="form-input"
                   (blur)="checkSkuDuplicate()">
            <span class="sku-check" *ngIf="skuCheckLoading">確認中...</span>
            <span class="sku-check sku-ok" *ngIf="!skuCheckLoading && editForm.get('sku')?.valid && !skuExists">&#10003;</span>
            <span class="sku-check sku-ng" *ngIf="!skuCheckLoading && skuExists">重複あり</span>
          </div>
        </app-form-field>

        <app-form-field label="ステータス" [required]="true">
          <select formControlName="status" class="form-select">
            <option *ngFor="let opt of statusOptions" [value]="opt.value">{{ opt.label }}</option>
          </select>
        </app-form-field>
      </div>

      <div class="form-row">
        <app-form-field label="説明">
          <textarea formControlName="description" class="form-textarea" rows="4"></textarea>
        </app-form-field>
      </div>

      <div class="form-row two-columns">
        <app-form-field label="カテゴリ" [required]="true"
                        [errorMessage]="editForm.get('categoryId')?.touched && editForm.get('categoryId')?.errors ? 'カテゴリを選択してください' : ''">
          <select formControlName="categoryId" class="form-select">
            <option [ngValue]="null" disabled>選択してください</option>
            <option *ngFor="let cat of categories" [ngValue]="cat.id">{{ cat.name }}</option>
          </select>
        </app-form-field>

        <app-form-field label="メーカー" [required]="true"
                        [errorMessage]="editForm.get('manufacturerId')?.touched && editForm.get('manufacturerId')?.errors ? 'メーカーを選択してください' : ''">
          <select formControlName="manufacturerId" class="form-select">
            <option [ngValue]="null" disabled>選択してください</option>
            <option *ngFor="let mfr of manufacturers" [ngValue]="mfr.id">{{ mfr.name }}</option>
          </select>
        </app-form-field>
      </div>
    </div>

    <!-- 価格・在庫セクション -->
    <div class="form-section">
      <h3 class="section-title">価格・在庫</h3>

      <div class="form-row two-columns">
        <app-form-field label="単価（税抜）" [required]="true"
                        [errorMessage]="editForm.get('unitPrice')?.touched && editForm.get('unitPrice')?.errors ? '単価を入力してください' : ''">
          <div class="input-with-prefix">
            <span class="input-prefix">¥</span>
            <input type="number" formControlName="unitPrice" class="form-input" min="0">
          </div>
        </app-form-field>

        <app-form-field label="単位" [required]="true">
          <select formControlName="unit" class="form-select">
            <option value="個">個</option>
            <option value="本">本</option>
            <option value="枚">枚</option>
            <option value="セット">セット</option>
            <option value="箱">箱</option>
            <option value="kg">kg</option>
            <option value="m">m</option>
            <option value="L">L</option>
          </select>
        </app-form-field>
      </div>

      <div class="form-row two-columns">
        <app-form-field label="最低発注数" [required]="true">
          <input type="number" formControlName="minimumOrderQuantity" class="form-input" min="1">
        </app-form-field>

        <app-form-field label="リードタイム（日）" [required]="true">
          <input type="number" formControlName="leadTimeDays" class="form-input" min="1">
        </app-form-field>
      </div>

      <div class="form-row two-columns">
        <app-form-field label="重量（kg）">
          <input type="number" formControlName="weight" class="form-input" step="0.1" min="0">
        </app-form-field>

        <app-form-field label="寸法">
          <input type="text" formControlName="dimensions" class="form-input"
                 placeholder="例: 100mm x 50mm x 30mm">
        </app-form-field>
      </div>
    </div>

    <!-- 仕様セクション -->
    <div class="form-section">
      <h3 class="section-title">仕様</h3>

      <div class="spec-rows" [formGroup]="specForm">
        <div class="spec-header">
          <span>項目名</span>
          <span>値</span>
          <span></span>
        </div>

        <div formArrayName="specifications">
          <div *ngFor="let row of specificationRows.controls; let i = index"
               [formGroupName]="i" class="spec-row">
            <input type="text" formControlName="key" class="form-input" placeholder="項目名">
            <input type="text" formControlName="value" class="form-input" placeholder="値">
            <button type="button" class="btn-remove" (click)="removeSpecificationRow(i)"
                    [disabled]="specificationRows.length <= 1">×</button>
          </div>
        </div>

        <button type="button" class="btn-add-row" (click)="addSpecificationRow()">
          + 仕様行を追加
        </button>
      </div>
    </div>

    <!-- 備考セクション -->
    <div class="form-section">
      <h3 class="section-title">備考</h3>
      <div class="form-row">
        <textarea formControlName="notes" class="form-textarea" rows="3"
                  placeholder="補足情報を入力してください"></textarea>
      </div>
    </div>

  </form>

    <!-- 画像セクション -->
    <div class="form-section">
      <h3 class="section-title">製品画像</h3>

      <div class="image-grid" *ngIf="existingImages.length > 0">
        <div *ngFor="let img of existingImages; let i = index" class="image-card">
          <img [src]="img.url" [alt]="'製品画像 ' + (i+1)" class="image-thumb">
          <div class="image-card-footer">
            <span class="image-badge" *ngIf="img.isPrimary">メイン</span>
            <button type="button" class="btn-delete-sm" (click)="deleteImage(i)">削除</button>
          </div>
        </div>
      </div>

      <p *ngIf="existingImages.length === 0" class="empty-message">画像はありません</p>

      <label class="upload-area">
        <input type="file" accept="image/png,image/jpeg" (change)="onImageSelected($event)" style="display:none">
        <span class="upload-label">{{ imageUploading ? 'アップロード中...' : '+ 画像を追加' }}</span>
      </label>
    </div>

    <!-- ドキュメントセクション -->
    <div class="form-section">
      <h3 class="section-title">ドキュメント</h3>

      <div class="doc-list" *ngIf="existingDocuments.length > 0">
        <div *ngFor="let doc of existingDocuments; let i = index" class="doc-item">
          <span class="doc-icon">&#128196;</span>
          <a [href]="doc.filePath" target="_blank" class="doc-link">{{ doc.fileName }}</a>
          <button type="button" class="btn-delete-sm" (click)="deleteDocument(i)">削除</button>
        </div>
      </div>

      <p *ngIf="existingDocuments.length === 0" class="empty-message">ドキュメントはありません</p>

      <div class="upload-row">
        <select [(ngModel)]="newDocType" class="form-select narrow">
          <option *ngFor="let opt of docTypeOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
        <label class="upload-area upload-area-inline">
          <input type="file" accept=".pdf,application/pdf" (change)="onDocumentSelected($event)" style="display:none">
          <span class="upload-label">{{ docUploading ? 'アップロード中...' : '+ ドキュメントを追加' }}</span>
        </label>
      </div>
    </div>

    <!-- アクションボタン -->
    <div class="form-actions">
      <button type="button" class="btn-cancel" (click)="cancel()">キャンセル</button>
      <button type="button" class="btn-submit" (click)="submit()" [disabled]="isSubmitting">
        {{ isSubmitting ? '更新中...' : '更新する' }}
      </button>
    </div>
</div>

<!-- エラー: データ取得失敗 -->
<div class="error-container" *ngIf="!isLoading && !product && errorMessage">
  <p>{{ errorMessage }}</p>
  <button class="btn-back" (click)="cancel()">一覧に戻る</button>
</div>
