# ============================================================
# ProQuip Nginx 設定ファイル
# Angular SPA配信 + APIリバースプロキシ + Keycloakプロキシ
#
# TODO: レート制限の設定が甘い。本番では厳密に設定すべき
# FIXME: SSL/TLS設定が含まれていない
# ============================================================

# アップストリーム定義
upstream wildfly_backend {
    server proquip-wildfly:8080;

    # コネクションのキープアライブ設定
    keepalive 32;
}

upstream keycloak_backend {
    server proquip-keycloak:8080;
    keepalive 16;
}

server {
    listen 8080;
    server_name localhost;

    # ルートディレクトリ（Angular SPA）
    root /usr/share/nginx/html/proquip;
    index index.html;

    # ログ設定
    access_log /var/log/nginx/proquip-access.log;
    error_log /var/log/nginx/proquip-error.log warn;

    # クライアントの最大リクエストサイズ
    # ファイルアップロード対応
    client_max_body_size 10m;

    # -------------------------------------------------
    # Gzip圧縮設定
    # -------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        font/ttf
        font/opentype
        image/svg+xml;

    # -------------------------------------------------
    # セキュリティヘッダー
    # TODO: Content-Security-Policyをより厳密に設定すべき
    # -------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------
    # 静的アセットのキャッシュ設定
    # JavaScript/CSSにはAngularのハッシュ付きファイル名を前提とした長期キャッシュ
    # -------------------------------------------------
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 画像・フォントファイルのキャッシュ
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 6M;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # -------------------------------------------------
    # 製品ドキュメント（DB file_url が /documents/... で格納済み）
    # -------------------------------------------------
    location ^~ /documents/ {
        alias /usr/share/nginx/html/static-files/documents/;
        expires 1d;
        add_header Cache-Control "private";
    }

    # -------------------------------------------------
    # 製品画像（DB image_url が /images/products/... で格納）
    # -------------------------------------------------
    location ^~ /images/products/ {
        alias /usr/share/nginx/html/static-files/images/products/;
        expires 6M;
        add_header Cache-Control "public";
    }

    # -------------------------------------------------
    # APIプロキシ設定（WildFlyバックエンド）
    # /api/* へのリクエストをWildFlyに転送
    # -------------------------------------------------
    location /api/ {
        proxy_pass http://wildfly_backend/proquip/api/;

        # プロキシヘッダー設定
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        # WebSocket対応（将来的な通知機能用）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # タイムアウト設定
        # FIXME: タイムアウトが長すぎる。レポート生成以外は短くすべき
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # バッファ設定
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;

        # APIレスポンスはキャッシュしない
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # -------------------------------------------------
    # Keycloakプロキシ設定
    # /auth/* へのリクエストをKeycloakに転送
    # -------------------------------------------------
    location /auth/ {
        proxy_pass http://keycloak_backend/;
        proxy_cookie_path ~^/.+ /;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;

        proxy_http_version 1.1;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # Keycloakが生成する絶対パスのリソース・エンドポイント用プロキシ
    # ログインページのCSS/JS (/resources/) およびログインアクション (/realms/)
    location ^~ /resources/ {
        proxy_pass http://keycloak_backend/resources/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location /realms/ {
        proxy_pass http://keycloak_backend/realms/;
        proxy_cookie_path ~^/.+ /;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # -------------------------------------------------
    # ヘルスチェックエンドポイント
    # -------------------------------------------------
    location /health {
        access_log off;
        try_files /health.json =200;
    }

    # -------------------------------------------------
    # Angular SPA ルーティング対応
    # 存在しないパスはすべてindex.htmlにフォールバック
    # -------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;

        # index.htmlはキャッシュしない（デプロイ時に更新を即反映するため）
        location = /index.html {
            add_header Cache-Control "no-cache";
        }
    }

    # -------------------------------------------------
    # セキュリティ: 隠しファイルへのアクセス拒否
    # (.well-known は Keycloak OIDC ディスカバリに必要なため除外)
    # -------------------------------------------------
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ソースマップへのアクセス制限（本番では無効化すべき）
    # TODO: 環境変数で制御できるようにする
    location ~* \.map$ {
        # 開発環境ではアクセスを許可
        # deny all;
    }
}
